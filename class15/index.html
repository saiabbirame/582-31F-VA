<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom Elements Demo</title>

    <style>
      user-card h2 {
        color: green;
      }

      user-card p {
        color: red;
      }

      user-card {
        font-size: larger;
      }
    </style>
  </head>
  <body>
    <h1>Custom Elements Demo</h1>

    <hello-box></hello-box>

    <user-card name="Jane" role="Forward"></user-card>
    <user-card name="John" role="Defense"></user-card>

    <!-- a game card element takes title, genre, players -->
    <game-card title="Tic-Tac-Toe" genre="Puzzle" players="2"></game-card>
    <game-card title="Fifa" genre="Sports" players="1"></game-card>

    <br />
    <br />
    <br />

    <course-name
      title="Web Programming"
      credits="3"
      instructor="John Doe"
    ></course-name>

    <course-name
      title="Data Science"
      credits="2"
      instructor="Jane Doe"
    ></course-name>

    <script src="script.js"></script>
  </body>
</html>
