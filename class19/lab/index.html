<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festival Lineup Guide</title>
</head>
<body>
    <main>
        <h1>Festival Lineup Guide</h1>

        <p>Load the festival lineup and click an artist to view more information.</p>

        <p id="status">Click the button to load the lineup.</p>

        <button id="load-btn">Load Lineup</button>
        <button id="clear-btn">Clear</button>

        <template id="artist-template">
            <style>
                .card {
                    background-color: #f5f5f5;
                    border: 1px solid #333;
                    border-radius: 5px;
                    padding: 1rem;
                    margin: 1rem 0;
                }

                h2 {
                    margin-top: 0;
                }

                button {
                    padding: 1rem;
                    cursor: pointer;
                }

                .headliner {
                    border: 2px solid #FFD428;
                    background-color: #FFF8DC;
                }
            </style>

            <article class="card">
                <h2 class="artist-name">Artist Name</h2>
                <p class="artist-genre">Genre</p>
                <p class="artist-stage">Stage</p>
                <p class="artist-time">Time</p>
                <p class="artist-country">Country</p>
                <p class="artist-headliner">Headliner</p>

                <button class="details-btn">View Details</button>
            </article>
        </template>

        <section>
            <h2>Lineup</h2>
            <div id="lineup-container"></div>
        </section>

        <section>
            <h2>Artist Details</h2>
            <div id="details-container">
                <p>No artist selected yet.</p>
            </div>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
