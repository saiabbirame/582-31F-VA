<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Tournament Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container my-5">
        <h1>Arcade Tournament Dashboard</h1>

        <p class="text-muted">Load tournaments, view tournament details and see registrations.</p>

        <div class="mb-3">
            <button id="load-tournaments-btn" class="btn btn-primary">Load Tournaments</button>

            <button id="clear-btn" class="btn btn-secondary">Clear</button>
        </div>

        <div id="status" class="alert alert-secondary">Click the button to load tournaments.</div>

        <section class="mb-3">
            <h2>Tournaments</h2>
            <p class="text-muted">Tournament cards will appear here.</p>

            <div id="tournaments-container" class="row g-3"></div>
        </section>

        <section>
            <h2>Registrations</h2>
            <p class="text-muted">Select a tournament to view its registrations.</p>

            <div id="registrations-container"></div>
        </section>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
