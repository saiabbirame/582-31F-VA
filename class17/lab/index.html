<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Cup Dashboard</title>
  </head>
  <body>
    <main>
      <h1>World Cup Dashboard</h1>

      <p>Load World Cup team data and select a team to view more information.</p>

      <p id="status">Click the button to load teams.</p>

      <button id="load-btn">Load Teams</button>
      <button id="clear-btn">Clear</button>

      <section>
        <h2>Teams</h2>
        <div id="teams-container"></div>
      </section>

      <section>
        <h2>Selected Team</h2>
        <div id="details-container">
          <p>No team selected yet.</p>
        </div>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
